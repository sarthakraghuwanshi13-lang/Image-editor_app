<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixelForge — Advanced Image Editor</title>
  <meta name="description" content="PixelForge is a powerful browser-based image editor with real-time filters, AI-powered effects, batch processing, and a modern editing studio experience.">
  <link rel="stylesheet" href="./style.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <meta name="theme-color" content="#6c5ce7">
</head>
<body>

  <!-- ═══ Top Bar ═══ -->
  <header class="topbar" id="topbar">
    <div class="topbar-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/><line x1="12" y1="22" x2="12" y2="15.5"/><polyline points="22 8.5 12 15.5 2 8.5"/></svg>
      PixelForge
    </div>
    <div class="topbar-actions">
      <button class="topbar-btn" id="new-image-btn" title="Open new image"><span>📂</span><span>Open</span></button>
      <button class="topbar-btn" id="compare-btn" title="Toggle before/after (Space)"><span>◐</span><span>Compare</span></button>
      <button class="topbar-btn" id="batch-toggle-btn" title="Batch processing mode"><span>📦</span><span>Batch</span></button>
      <button class="topbar-btn" id="shortcuts-btn" title="Keyboard shortcuts (?)"><span>⌨️</span></button>
      <button class="topbar-btn" id="theme-toggle-btn" title="Toggle dark/light mode"></button>
    </div>
  </header>

  <!-- ═══ Hidden File Inputs ═══ -->
  <input type="file" id="file-input" class="hidden-input" accept="image/*">
  <input type="file" id="file-input-editor" class="hidden-input" accept="image/*">
  <input type="file" id="batch-file-input" class="hidden-input" accept="image/*" multiple>

  <!-- ═══ Landing View ═══ -->
  <main class="landing-view" id="landing-view">
    <h1 class="landing-title">PixelForge</h1>
    <p class="landing-subtitle">Professional image editing in your browser</p>
    <div class="drop-zone" id="drop-zone">
      <span class="drop-zone-icon">🖼️</span>
      <p class="drop-zone-text">Drag & drop your image here</p>
      <p class="drop-zone-hint">or click to browse — Supports PNG, JPG, WebP</p>
      <button class="upload-btn" id="upload-trigger">Choose Image</button>
    </div>
  </main>

  <!-- ═══ Editor View ═══ -->
  <div class="editor-view hidden" id="editor-view">

    <!-- Left Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="adjustments">⚙️ Adjust</button>
        <button class="sidebar-tab" data-tab="presets">🎨 Presets</button>
        <button class="sidebar-tab" data-tab="ai">🧠 AI</button>
        <button class="sidebar-tab" data-tab="favorites">★ Favs</button>
      </div>
      <div class="sidebar-content">
        <div class="sidebar-panel active" data-panel="adjustments" id="adjustments-panel">
          <!-- Sliders rendered by JS -->
        </div>
        <div class="sidebar-panel" data-panel="presets" id="presets-panel">
          <!-- Preset cards rendered by JS -->
        </div>
        <div class="sidebar-panel" data-panel="ai" id="ai-panel">
          <!-- AI filters rendered by JS -->
        </div>
        <div class="sidebar-panel" data-panel="favorites" id="favorites-panel">
          <!-- Favorites rendered by JS -->
        </div>
      </div>
    </aside>

    <!-- Canvas Area -->
    <section class="canvas-area" id="canvas-area">
      <div class="canvas-wrapper" id="canvas-wrapper">
        <canvas id="main-canvas"></canvas>
        <canvas id="overlay-canvas"></canvas>
      </div>
      <div class="editor-drop-zone" id="editor-drop-zone">
        <p style="color: var(--text-primary); font-size: 1.2rem;">Drop image to replace</p>
      </div>
    </section>

    <!-- Right Panel -->
    <aside class="right-panel" id="right-panel">

      <!-- History -->
      <div class="panel-section">
        <div class="panel-section-title">History</div>
        <div class="history-controls">
          <button id="undo-btn" disabled title="Undo (Ctrl+Z)">↩ Undo</button>
          <button id="redo-btn" disabled title="Redo (Ctrl+Y)">↪ Redo</button>
          <span id="history-counter">Step 0 / 0</span>
        </div>
      </div>

      <!-- Filter Stack -->
      <div class="panel-section" style="flex-shrink:0;">
        <div class="panel-section-title">Filter Stack</div>
      </div>
      <div class="panel-scrollable" id="filter-stack-list">
        <div class="empty-stack">No filters applied yet</div>
      </div>

      <!-- Download -->
      <div class="panel-section" style="border-top:1px solid var(--border); border-bottom:none;">
        <div class="panel-section-title">Export</div>
        <div class="download-row">
          <label for="download-format">Format</label>
          <select id="download-format" class="pf-select">
            <option value="png">PNG</option>
            <option value="jpg">JPG</option>
            <option value="webp">WebP</option>
          </select>
        </div>
        <div class="download-row" id="quality-row" style="display:none;">
          <label for="download-quality">Quality</label>
          <input type="range" class="pf-slider" id="download-quality" min="0.1" max="1" value="0.92" step="0.01">
          <span id="download-quality-label" class="slider-value">92%</span>
        </div>
        <button class="btn-primary" id="download-action-btn">⬇ Download</button>
        <button class="btn-danger" id="revert-btn">✕ Remove All Filters</button>
      </div>

      <!-- Batch Panel -->
      <div class="batch-panel" id="batch-panel">
        <div class="batch-panel-header">
          <span class="panel-section-title" style="margin:0;">Batch Queue</span>
          <button class="btn-sm" id="batch-add-btn">+ Add</button>
        </div>
        <div id="batch-images-list"></div>
        <div class="batch-progress"><div id="batch-progress-bar"></div></div>
        <span id="batch-progress-text" style="font-size:0.75rem; color:var(--text-muted);"></span>
        <div class="batch-actions">
          <button class="btn-sm" id="batch-process-btn">▶ Process</button>
          <button class="btn-sm" id="batch-download-btn">⬇ Download All</button>
          <button class="btn-sm" id="batch-clear-btn">✕ Clear</button>
        </div>
      </div>
    </aside>
  </div>

  <!-- ═══ Shortcuts Modal ═══ -->
  <div class="modal-overlay" id="shortcuts-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>⌨️ Keyboard Shortcuts</h3>
        <button class="modal-close" id="shortcuts-close">✕</button>
      </div>
      <div id="shortcuts-list"></div>
    </div>
  </div>

  <!-- ═══ Toast Container ═══ -->
  <div id="toast-container"></div>

  <!-- ═══ Scripts ═══ -->
  <script type="module" src="./js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
